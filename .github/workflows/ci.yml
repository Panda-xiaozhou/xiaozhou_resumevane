# ResumeVane CI/CD Pipeline
# 每次 push 或 PR 自动运行代码检查和构建验证

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Python 后端检查 ────────────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: resumevane_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/ --ignore E501

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/resumevane_test
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        run: |
          pytest backend/tests/ -v --cov=backend --cov-report=term-missing

  # ── 前端构建验证 ────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install & Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  # ── Docker 镜像构建验证 ─────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t resumevane:ci .
