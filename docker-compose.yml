# ============================================================
# ResumeVane Docker Compose 编排文件
# ============================================================
# 包含三个服务:
#   db      — PostgreSQL 16 + pgvector 扩展（向量检索）
#   chroma  — ChromaDB 向量数据库（备用，当前以 pgvector 为主）
#   backend — FastAPI 后端应用
#
# 启动: docker-compose up -d
# 停止: docker-compose down
# 查看日志: docker-compose logs -f backend
# ============================================================

version: "3.9"

services:
  # ── PostgreSQL 数据库（含 pgvector 扩展）─────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resumevane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis（任务队列 + 缓存）────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ChromaDB 向量数据库 ────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    restart: unless-stopped

  # ── FastAPI 后端 ───────────────────────────────────
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/resumevane
      REDIS_URL: redis://redis:6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_CHAT_ID: ${FEISHU_CHAT_ID}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── ARQ Worker（后台任务处理器）─────────────────────
  worker:
    build: .
    command: ["arq", "backend.services.task_queue.WorkerSettings", "--watch", "backend"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/resumevane
      REDIS_URL: redis://redis:6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_CHAT_ID: ${FEISHU_CHAT_ID}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

# ── 数据卷 — 容器删除后数据保留 ─────────────────────
volumes:
  pgdata:                              # PostgreSQL 数据
  uploads:                             # 用户上传的简历文件
